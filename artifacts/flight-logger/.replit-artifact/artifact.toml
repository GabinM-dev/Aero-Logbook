kind = "web"
previewPath = "/"
title = "Flight Logger"
version = "1.0.0"
id = "artifacts/flight-logger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18738

[services.development]
run = "pnpm --filter @workspace/flight-logger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flight-logger", "run", "build" ]
publicDir = "artifacts/flight-logger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18738"
BASE_PATH = "/"
